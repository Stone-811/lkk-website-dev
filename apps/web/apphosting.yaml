# Firebase App Hosting configuration
# https://firebase.google.com/docs/app-hosting

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://lkk-website-dev.web.app
  - variable: FIREBASE_PROJECT_ID
    value: lkk-website-dev
  # SMTP Settings
  - variable: SMTP_HOST
    value: smtp.gmail.com
  - variable: SMTP_PORT
    value: "465"
  - variable: SMTP_USER
    value: tingo8320@gmail.com
  - variable: SMTP_FROM
    value: tingo8320@gmail.com
  - variable: NOTIFICATION_EMAIL
    value: tingo8320@gmail.com
  # SMTP Password - use Firebase Secret
  - variable: SMTP_PASS
    secret: smtp-pass
